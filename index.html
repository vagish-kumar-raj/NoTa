<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nota</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Nota</h1>
    <div>
        <label for="user-notes">Your Notes:</label><br>
        <textarea 
            id="user-notes" 
            name="userNotes" 
            rows="10" 
            cols="50" 
            placeholder="Start typing your notes here..."
            maxlength="2000">
        </textarea>
    </div>
    <button id="saveButton">Save Note</button>
</body>
</html>
